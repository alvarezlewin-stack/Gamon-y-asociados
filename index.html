<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gamón & Asociados — Agenda</title>
  <meta name="description" content="Agenda jurídica, clientes, expedientes y vencimientos para Gamón & Asociados." />

  <script>
    // Manejo de errores: registra en consola para diagnóstico técnico,
    // y solo si la app no llega a cargar, muestra un aviso amigable (sin detalles técnicos).
    window.addEventListener("error", function (e) {
      console.error("[Gamón Agenda] Error:", e && e.message, e);
    });
    window.addEventListener("load", function () {
      setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.children.length === 0) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:sans-serif;color:#F3EDD9;background:#0B0B0A;">' +
            '<p style="font-size:16px;margin-bottom:8px;">No se pudo cargar la aplicación.</p>' +
            '<p style="font-size:13px;color:#F3EDD9AA;">Revisá tu conexión a internet y volvé a intentar. Si el problema sigue, avisá al soporte técnico.</p>' +
            "</div>";
        }
      }, 4000);
    });
  </script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0B0B0A" />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gamón Agenda" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind (utility classes only, no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React (no-build, via CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #0B0B0A; -webkit-tap-highlight-color: transparent; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { user-select: text; -webkit-user-select: text; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="storage-service.js"></script>
  <script src="validation-service.js"></script>
  <script src="institution-service.js"></script>
  <script src="persona-service.js"></script>
  <script src="smoke-test.js"></script>
  <script src="app.js"></script>

  <script>
    // Registrar el service worker para que la app funcione offline
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {
          // si falla el registro, la app sigue funcionando online igual
        });
      });
    }
  </script>
</body>
</html>
