<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gamón & Asociados — Agenda</title>
  <meta name="description" content="Agenda jurídica, clientes, expedientes y vencimientos para Gamón & Asociados." />

  <script>
    // DIAGNÓSTICO TEMPORAL: mostramos el error real en pantalla para encontrar
    // la causa del cuelgue sin necesitar computadora conectada. Sacar apenas
    // se resuelva (volver a la versión silenciosa que había antes).
    window.addEventListener("error", function (e) {
      console.error("[Gamón Agenda] Error:", e && e.message, e);
      var msg = (e && e.message) ? e.message : "Error desconocido";
      var src = (e && e.filename) ? e.filename.split("/").pop() : "";
      var line = (e && e.lineno) ? e.lineno : "";
      var box = document.createElement("pre");
      box.style.cssText = "color:#fff;background:#C9564B;padding:16px;white-space:pre-wrap;font-size:13px;font-family:monospace;margin:0;position:fixed;top:0;left:0;right:0;z-index:99999;max-height:100vh;overflow:auto;";
      box.textContent = "ERROR DETECTADO:\n" + msg + (src ? "\nArchivo: " + src + " (línea " + line + ")" : "");
      function attach() { (document.body || document.documentElement).appendChild(box); }
      if (document.body) attach(); else document.addEventListener("DOMContentLoaded", attach);
    });
    window.addEventListener("unhandledrejection", function (e) {
      console.error("[Gamón Agenda] Promesa rechazada sin capturar:", e.reason);
      var box = document.createElement("pre");
      box.style.cssText = "color:#fff;background:#9B7FC9;padding:16px;white-space:pre-wrap;font-size:13px;font-family:monospace;margin:0;position:fixed;top:0;left:0;right:0;z-index:99999;max-height:100vh;overflow:auto;";
      var reason = e.reason;
      var texto;
      try { texto = (reason && reason.message) ? reason.message : JSON.stringify(reason); } catch (err) { texto = String(reason); }
      box.textContent = "PROMESA RECHAZADA SIN CAPTURAR:\n" + texto;
      function attach() { (document.body || document.documentElement).appendChild(box); }
      if (document.body) attach(); else document.addEventListener("DOMContentLoaded", attach);
    });
    window.addEventListener("load", function () {
      setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.children.length === 0) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:sans-serif;color:#ECEDEF;background:#0A0C0F;">' +
            '<p style="font-size:16px;margin-bottom:8px;">No se pudo cargar la aplicación.</p>' +
            '<p style="font-size:13px;color:#ECEDEFAA;">Revisá tu conexión a internet y volvé a intentar. Si el problema sigue, avisá al soporte técnico.</p>' +
            "</div>";
        }
      }, 4000);
    });
  </script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0A0C0F" />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gamón Agenda" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind (utility classes only, no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React (no-build, via CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    /* ===== LexFlow Design System 1.0 — tokens oficiales (fuente: lexflow-component-library.html, D-013) ===== */
    :root {
      --bg: #0A0C0F; --card: #14171D;
      --hairline: #262B33; --hairline-soft: #1D2127;
      --text: #ECEDEF; --text-dim: #8B929E; --text-faint: #5B616B;
      --gold: #C9A24B; --gold-bright: #E4C878; --gold-dim: rgba(201,162,75,0.12);
      --danger: #C9564B; --danger-dim: rgba(201,86,75,0.12);
      --success: #4C9A6A; --success-dim: rgba(76,154,106,0.12);
      --info: #4C7FC9; --info-dim: rgba(76,127,201,0.12);
      --purple: #9B7FC9; --purple-dim: rgba(155,127,201,0.14);
      --radius: 10px; --radius-lg: 16px;
    }
    .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: .13em; text-transform: uppercase; color: var(--text-faint); }
    .lf-card { background: var(--card); border: 1px solid var(--hairline-soft); border-radius: var(--radius); }
    .lf-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
    html, body, #root { height: 100%; }
    body { margin: 0; background: #0A0C0F; -webkit-tap-highlight-color: transparent; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { user-select: text; -webkit-user-select: text; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="storage-service.js"></script>
  <script src="i18n.js"></script>
  <script src="perfil-usuario-service.js"></script>
  <script src="referential-integrity-service.js"></script>
  <script src="validation-service.js"></script>
  <script src="institution-service.js"></script>
  <script src="persona-service.js"></script>
  <script src="proceso-parte-service.js"></script>
  <script src="proceso-service.js"></script>
  <script src="actuacion-service.js"></script>
  <script src="smoke-test.js"></script>
  <script src="app.js"></script>

  <script>
    // Registrar el service worker para que la app funcione offline
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {
          // si falla el registro, la app sigue funcionando online igual
        });
      });
    }
  </script>
</body>
</html>
